###############################################################################
# TERMINAL SETTINGS
###############################################################################

# True color support
set-option -ga terminal-overrides ",xterm-256color:Tc"

# Terminal type
set -g default-terminal "xterm-256color"

###############################################################################
# GENERAL SETTINGS
###############################################################################

# Prefix key
set -g prefix C-b

# Repeat timeout
set -g repeat-time 500

# Scrollback history
set -g history-limit 2000

# Default shell
set -g default-shell /bin/bash

# Mouse support
set -g mouse off

# Bell behavior
set -g bell-action none

# Pane number display duration
set -g display-panes-time 1000

###############################################################################
# WINDOW & PANE SETTINGS
###############################################################################

set -g base-index 0
set -g pane-base-index 1
set -g renumber-windows off

###############################################################################
# VIM COPY MODE
###############################################################################

# Use Vim keybindings in copy mode
set -g mode-keys vi

# Visual mode
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Visual line mode
bind-key -T copy-mode-vi V send-keys -X select-line

# Yank and exit copy mode
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"

###############################################################################
# STATUS BAR
###############################################################################

set -g status-bg colour235
set -g status-fg colour223
set -g status-style default

# Active window
set-window-option -g window-status-current-style bg=colour178,fg=colour0,bold
set-window-option -g window-status-current-format " #I  #W "

# Inactive windows
set-window-option -g window-status-style bg=colour236,fg=colour223
set-window-option -g window-status-format " #I  #W "

# Left side
set -g status-left-length 40
set -g status-left ""

# Right side
set -g status-right-length 60
set -g status-right "#[bg=colour236,fg=colour223] %H:%M #[default]  #[fg=colour223]%d-%b-%y "

###############################################################################
# BASIC KEYBINDS
###############################################################################

# Send prefix to nested tmux session
bind-key C-b send-prefix

# New window
bind-key C-c new-window

# Kill window
bind-key C-w kill-window

# Kill pane
bind-key C-q kill-pane

# Window navigation
bind-key C-n next-window
bind-key C-p previous-window

###############################################################################
# SPLITS
###############################################################################

bind-key C-h split-window -h
bind-key C-v split-window -v

###############################################################################
# VIM / NEOVIM PANE NAVIGATION
###############################################################################

# Detect vim/nvim in current pane
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"

# Seamless movement between tmux panes and vim splits
bind-key -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

###############################################################################
# COPY MODE PANE MOVEMENT
###############################################################################

bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R

###############################################################################
# CHEATSHEET
###############################################################################

# Enter copy mode:
